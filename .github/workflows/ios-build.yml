name: iCoass iOS Compilation Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-ios:
    name: Compile iOS Application
    runs-on: macos-latest

    defaults:
      run:
        working-directory: ./fluttergetx

    steps:
      # 1. Melakukan checkout kode sumber dari repositori GitHub
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Menginisiasi lingkungan kerja Flutter (Perbaikan parameter versi)
      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable' # Mengeliminasi biner duplikat untuk mencegah kegagalan resolusi ARM64
          cache: true

      # 3. Mengunduh dependensi Flutter dan mengonfigurasi CocoaPods
      - name: Install Dependencies and Pods
        run: |
          flutter pub get
          cd ios && pod install

      # 4. Melakukan kompilasi aplikasi tanpa Code Signing
      - name: Build iOS (Unsigned)
        run: flutter build ios --no-codesign --release